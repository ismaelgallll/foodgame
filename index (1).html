<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Restaurant Rush</title>
<style>
body{margin:0;background:#f4e3c2;font-family:Arial;text-align:center}
#game{max-width:700px;margin:20px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px #999}
button{padding:12px 20px;margin:8px;font-size:16px;cursor:pointer}
h1{margin-top:0}
</style>
</head>
<body>
<div id="game">
<h1>🍔 Restaurant Rush</h1>
<p id="stats"></p>
<p id="customer"></p>
<button onclick="cookBurger()">Cook Burger 🍔</button>
<button onclick="serveCustomer()">Serve Customer 🍽️</button>
<button onclick="buyUpgrade()">Upgrade Grill ($50)</button>
</div>

<script>
let money=0;
let burgers=0;
let customers=1;
let grillLevel=1;

function update(){
document.getElementById("stats").innerHTML=
`💵 Money: $${money} | 🍔 Burgers: ${burgers} | 🔥 Grill Lv.${grillLevel}`;
document.getElementById("customer").innerHTML=
customers>0?`👤 Waiting Customers: ${customers}`:"🎉 No customers! New customer arriving...";
}

function cookBurger(){
burgers+=grillLevel;
update();
}

function serveCustomer(){
if(customers>0 && burgers>0){
customers--;
burgers--;
money+=10*grillLevel;
if(customers===0){
setTimeout(()=>{
customers=Math.floor(Math.random()*4)+1;
update();
},1500);
}
}
update();
}

function buyUpgrade(){
if(money>=50){
money-=50;
grillLevel++;
update();
}else{
alert("Not enough money!");
}
}

update();
</script>
</body>
</html>
